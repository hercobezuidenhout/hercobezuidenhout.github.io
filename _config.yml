###########
# site.title

title: Herco Bezuidenhout
description: a minimal, text focused blog theme
url: "https://hercobezuidenhout.github.io"


#########################
# more settings

plugins:
  - jekyll-redirect-from

whitelist:
  - jekyll-redirect-from

markdown: kramdown

compress_html:
  clippings: all
  comments: [""]
  endings: [html, head, body, li, dt, dd, rt, rp, optgroup, option, colgroup, caption, thead, tbody, tfoot, tr, td, th]
  profile: false
  blanklines: false
  ignore:
    envs: []

# sass:
#   sass_dir: css
#   style:    compressed

collections:
  tags:
    output: true
    permalink: /tagged/:slug/
defaults:
  -
    scope:
      path: ""
      type: tags
    values:
      layout: tagged

# baseurl: ""
permalink: /blog/:slug
timezone: Africa/Johannesburg
future: false

exclude:
- README.md
- LICENSE.md

exclude: [vendor]

Blog: /blog

# Add general links to site pages here
# links:
#   Projects: /projects
  

# Add links for more focus here
special_links:
  "Github": https://github.com/hercobezuidenhout